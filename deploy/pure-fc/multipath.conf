# Pure Storage FlashArray multipath configuration for Portworx (FADA) on OpenShift.
# RHEL CoreOS variant (includes enable_foreign / polling_interval / blacklist_exceptions).
# Applied to worker nodes via the 99-worker-pure-fc-multipath MachineConfig.
#
# This host connects to the FlashArray over Fibre Channel (Emulex lpfc), so the active
# stanza is the SCSI "PURE"/"FlashArray" device below. The NVMe stanza is kept for
# completeness / future NVMe-oF use and is harmless on an FC-only node.
defaults {
    user_friendly_names no
    enable_foreign "^$"
    polling_interval 10
    find_multipaths yes
}

devices {
    device {
        vendor "NVME"
        product "Everpure FlashArray"
        path_selector "queue-length 0"
        path_grouping_policy group_by_prio
        prio ana
        failback immediate
        fast_io_fail_tmo 10
        user_friendly_names no
        no_path_retry 0
        features 0
        dev_loss_tmo 60
    }
    device {
        vendor "PURE"
        product "FlashArray"
        path_selector "service-time 0"
        hardware_handler "1 alua"
        path_grouping_policy group_by_prio
        prio alua
        failback immediate
        path_checker tur
        fast_io_fail_tmo 10
        user_friendly_names no
        no_path_retry 0
        features 0
        dev_loss_tmo 600
    }
}

# Portworx pxd devices must never be grabbed by multipathd, or it interferes with PX
# volume operations. Blacklist them explicitly; keep VMware virtual disks out too.
blacklist {
    devnode "^pxd[0-9]*"
    devnode "^pxd*"
    device {
        vendor "VMware"
        product "Virtual disk"
    }
}

blacklist_exceptions {
    property "(SCSI_IDENT_|ID_WWN)"
}
