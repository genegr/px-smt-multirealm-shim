# Portworx Operator (certified) install on ocp4-dev. Channel 'stable' -> portworx-operator.v26.2.1.
# openshift-operators already carries the global-operators OperatorGroup (AllNamespaces).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: portworx-certified
  namespace: openshift-operators
spec:
  channel: stable
  name: portworx-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
