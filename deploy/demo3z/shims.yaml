# 3-zone-via-shim demo: two shims front three "arrays" across two physical FlashArrays, so PX
# sees an odd (3) zone count and accepts the topology.
#   px-shim-x50 -> x50, FQDN fa-a.demo.pure (realm-1, zone-a). Single realm on a physically
#                  distinct array, so ARRAY_IDENTITY=false (avoids the single-realm FADA caveat;
#                  x50's real id already differs from x20).
#   px-shim-x20 -> x20, FQDNs fa-b.demo.pure (realm-2, zone-b) + fa-c.demo.pure (realm-3, zone-c).
#                  Two realms on ONE physical array, so ARRAY_IDENTITY=true splits them into two
#                  distinct synthetic arrays -> the trick that manufactures the 3rd zone.
---
apiVersion: v1
kind: Namespace
metadata:
  name: px-shim
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: px-shim-x50, namespace: px-shim, labels: { app: px-shim-x50 } }
spec:
  replicas: 1
  selector: { matchLabels: { app: px-shim-x50 } }
  template:
    metadata: { labels: { app: px-shim-x50 } }
    spec:
      containers:
        - name: px-shim
          image: px-shim.local/shim:baseline
          imagePullPolicy: Never
          ports: [{ name: https, containerPort: 9443 }]
          env:
            - { name: SHIM_LISTEN_ADDR, value: ":9443" }
            - { name: SHIM_UPSTREAM_URL, value: "https://10.23.26.50" }
            - { name: SHIM_UPSTREAM_INSECURE, value: "true" }
            - { name: SHIM_CERT_SANS, value: "fa-a.demo.pure" }
            - { name: SHIM_LOG_BODIES, value: "true" }
            - { name: SHIM_REWRITE, value: "true" }
            - { name: SHIM_ARRAY_IDENTITY, value: "false" }
            - { name: SHIM_CONFIG_FILE, value: "/etc/px-shim/config.json" }
            - name: SHIM_ARRAY_TOKEN
              valueFrom: { secretKeyRef: { name: px-shim-x50-config, key: array-token } }
          volumeMounts: [{ name: config, mountPath: /etc/px-shim, readOnly: true }]
          readinessProbe: { tcpSocket: { port: 9443 }, initialDelaySeconds: 3, periodSeconds: 10 }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - name: config
          secret: { secretName: px-shim-x50-config, items: [{ key: config.json, path: config.json }] }
---
apiVersion: v1
kind: Service
metadata: { name: px-shim-x50, namespace: px-shim, labels: { app: px-shim-x50 } }
spec:
  type: ClusterIP
  selector: { app: px-shim-x50 }
  ports: [{ name: https, port: 443, targetPort: 9443 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: px-shim-x20, namespace: px-shim, labels: { app: px-shim-x20 } }
spec:
  replicas: 1
  selector: { matchLabels: { app: px-shim-x20 } }
  template:
    metadata: { labels: { app: px-shim-x20 } }
    spec:
      containers:
        - name: px-shim
          image: px-shim.local/shim:baseline
          imagePullPolicy: Never
          ports: [{ name: https, containerPort: 9443 }]
          env:
            - { name: SHIM_LISTEN_ADDR, value: ":9443" }
            - { name: SHIM_UPSTREAM_URL, value: "https://10.23.26.60" }
            - { name: SHIM_UPSTREAM_INSECURE, value: "true" }
            - { name: SHIM_CERT_SANS, value: "fa-b.demo.pure,fa-c.demo.pure" }
            - { name: SHIM_LOG_BODIES, value: "true" }
            - { name: SHIM_REWRITE, value: "true" }
            - { name: SHIM_ARRAY_IDENTITY, value: "true" }
            - { name: SHIM_CONFIG_FILE, value: "/etc/px-shim/config.json" }
            - name: SHIM_ARRAY_TOKEN
              valueFrom: { secretKeyRef: { name: px-shim-x20-config, key: array-token } }
          volumeMounts: [{ name: config, mountPath: /etc/px-shim, readOnly: true }]
          readinessProbe: { tcpSocket: { port: 9443 }, initialDelaySeconds: 3, periodSeconds: 10 }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - name: config
          secret: { secretName: px-shim-x20-config, items: [{ key: config.json, path: config.json }] }
---
apiVersion: v1
kind: Service
metadata: { name: px-shim-x20, namespace: px-shim, labels: { app: px-shim-x20 } }
spec:
  type: ClusterIP
  selector: { app: px-shim-x20 }
  ports: [{ name: https, port: 443, targetPort: 9443 }]
