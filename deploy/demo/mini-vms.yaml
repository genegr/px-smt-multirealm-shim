# The 3 KubeVirt VMs that become the compact nested OCP cluster "mini".
# Each: a blank 120Gi PX-replicated root disk (Block) + the agent ISO imported via CDI (cdrom),
# a bridged NIC on br-vm with a pinned MAC (matched by agent-config for static IPs), 8 vCPU/20Gi.
# Boot order root=1, iso=2: the empty root isn't bootable so BIOS falls through to the agent ISO,
# which installs to the root disk; on reboot the now-bootable disk wins and the cdrom is ignored.
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata: { name: mini-0, namespace: mini }
spec:
  running: true
  dataVolumeTemplates:
    - metadata: { name: mini-0-root }
      spec:
        storage:
          storageClassName: px-csi-replicated
          accessModes: [ReadWriteOnce]
          volumeMode: Block
          resources: { requests: { storage: 120Gi } }
        source: { blank: {} }
    - metadata: { name: mini-0-iso }
      spec:
        storage:
          storageClassName: px-csi-replicated
          accessModes: [ReadWriteOnce]
          resources: { requests: { storage: 2Gi } }
        source: { http: { url: "http://10.23.26.20:8080/agent-mini.iso" } }
  template:
    metadata: { labels: { kubevirt.io/vm: mini-0 } }
    spec:
      domain:
        cpu: { cores: 8 }
        memory: { guest: 20Gi }
        devices:
          disks:
            - { name: root, bootOrder: 1, disk: { bus: virtio } }   # -> /dev/vda (OS)
            - { name: kvdb, disk: { bus: virtio } }                  # -> /dev/vdb (PX kvdb 32Gi)
            - { name: meta, disk: { bus: virtio } }                  # -> /dev/vdc (PX-StoreV2 metadata 64Gi)
            - { name: data, disk: { bus: virtio } }                  # -> /dev/vdd (PX-StoreV2 data 150Gi)
            - { name: iso, bootOrder: 2, cdrom: { bus: sata } }
          interfaces:
            - name: br
              bridge: {}
              macAddress: "02:00:00:aa:00:31"
              model: virtio
      networks:
        - name: br
          multus: { networkName: br-vm }
      volumes:
        - { name: root, dataVolume: { name: mini-0-root } }
        - { name: kvdb, dataVolume: { name: mini-0-kvdb } }
        - { name: meta, dataVolume: { name: mini-0-meta } }
        - { name: data, dataVolume: { name: mini-0-data } }
        - { name: iso, dataVolume: { name: mini-0-iso } }
