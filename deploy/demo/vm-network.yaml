# VM networking for the nested cluster: a Linux bridge (br-vm) on each worker's spare NIC
# (eno34np1, already on 10.23.26.0/24), built via kubernetes-nmstate, plus a cnv-bridge
# NetworkAttachmentDefinition the VMs attach to. Gives VMs L2 IPs on 10.23.26.0/24 reachable
# by the jump host (DNS/VIPs). Requires the kubernetes-nmstate operator + an NMState CR first.
---
apiVersion: nmstate.io/v1
kind: NMState
metadata:
  name: nmstate
---
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: br-vm-eno34np1
spec:
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  desiredState:
    interfaces:
      - name: br-vm
        type: linux-bridge
        state: up
        ipv4: { enabled: false }
        ipv6: { enabled: false }
        bridge:
          options:
            stp: { enabled: false }
          port:
            - name: eno34np1
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: br-vm
  namespace: mini
spec:
  config: |
    {"cniVersion":"0.3.1","name":"br-vm","type":"cnv-bridge","bridge":"br-vm","macspoofchk":false}
